<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة محمد النمري</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0D0D0D;--bg-card:#161616;--text:#F0EDE6;--sub:#A89B8A;
  --border:#2A2520;--gold:#D4A843;--gold-l:#F0C866;--gold-d:#8A6E2A;
  --gold-bg:rgba(212,168,67,0.07);--r:10px;--sh:0 4px 24px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;direction:rtl;display:flex;flex-direction:column}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--gold-d);border-radius:4px}

/* HERO */
.hero{background:var(--bg-card);text-align:center;padding:12px 20px 10px;border-bottom:1px solid var(--border);border-radius:0 0 var(--r) var(--r);box-shadow:var(--sh);position:relative}
.hero::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,var(--gold-d),transparent)}
.brand{font-size:26px;font-weight:900;background:linear-gradient(135deg,var(--gold-l),var(--gold),var(--gold-d));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:1px}
.hero h1{font-size:11px;color:var(--sub);margin-bottom:10px}
.clock-panel{display:inline-flex;align-items:center;gap:14px;background:#111;padding:5px 16px;border-radius:30px;margin-bottom:10px;border:1px solid var(--border)}
.live-time{font-size:15px;font-weight:900;color:var(--gold-l);font-family:'Courier New',monospace;letter-spacing:1px}
.live-date{font-size:10.5px;font-weight:700;color:#5A9E6A;border-right:1px solid var(--border);padding-right:12px}
.live-hijri{font-size:10.5px;font-weight:700;color:#B07055;border-right:1px solid var(--border);padding-right:12px}

/* PRAYER */
.prayer-bar{background:#111;border:1px solid var(--border);padding:8px 14px;border-radius:8px;max-width:820px;margin:0 auto}
.prayers-row{display:flex;justify-content:center;align-items:center;gap:8px;flex-wrap:nowrap}
.prayer-lbl{font-size:10.5px;font-weight:900;color:var(--gold-d);white-space:nowrap}
.pi{font-size:10.5px;font-weight:700;display:inline-flex;align-items:center;gap:3px;padding:4px 9px;background:#1C1A16;color:#9A8B77;border-radius:5px;white-space:nowrap;border:1px solid transparent;transition:all .3s}
.pi span{font-family:monospace;font-weight:bold}
.pi.next{border-color:var(--gold-d);color:var(--gold-l);box-shadow:0 0 8px rgba(212,168,67,.2)}
.pi.next span{color:var(--gold)}
.countdown-row{margin-top:7px;padding-top:6px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:12px}
.cd-text{font-size:10.5px;font-weight:700;color:var(--sub)}
.cd-text span{color:var(--gold);font-weight:900;font-family:monospace}
.bar-bg{width:160px;height:4px;background:var(--border);border-radius:10px;overflow:hidden}
.bar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--gold-d),var(--gold));border-radius:10px;transition:width .5s ease}

/* SYNC STATUS */
.sync-bar{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:6px 0 0;font-size:10px;color:var(--sub)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#555;transition:background .3s}
.sync-dot.ok{background:#4CAF50}
.sync-dot.err{background:#c0392b}
.sync-dot.loading{background:var(--gold);animation:pulse .8s infinite alternate}
@keyframes pulse{to{opacity:.3}}

/* WRAP */
.wrap{flex:1;max-width:1000px;width:100%;margin:0 auto;padding:10px 18px}

/* TABS */
.tabs-nav{display:flex;gap:4px;margin-bottom:12px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tabs-nav::-webkit-scrollbar{display:none}
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;color:var(--sub);font-family:'Tajawal';font-size:12px;font-weight:700;padding:7px 14px;cursor:pointer;white-space:nowrap;transition:all .2s;margin-bottom:-1px}
.tab-btn:hover{color:var(--gold-l)}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-add{background:none;border:none;color:var(--gold-d);font-size:16px;cursor:pointer;padding:4px 8px;margin-bottom:-1px;transition:color .2s}
.tab-add:hover{color:var(--gold)}
.tab-pane{display:none}
.tab-pane.active{display:block}

/* CARDS GRID */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-bottom:12px;min-height:50px;position:relative}
.cards-grid.drag-over{background:rgba(212,168,67,.04);border-radius:var(--r);outline:1px dashed var(--gold-d)}

/* CARD */
.card{background:var(--bg-card);border-radius:var(--r);padding:14px 8px 12px;text-align:center;border:1px solid var(--border);text-decoration:none;color:var(--text);display:flex;flex-direction:column;align-items:center;gap:6px;transition:border-color .22s,box-shadow .22s;position:relative;overflow:hidden;cursor:grab;user-select:none}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold-d);opacity:0;transition:opacity .3s}
.card:hover{border-color:var(--gold-d);box-shadow:0 0 20px rgba(212,168,67,.15)}
.card:hover::before{opacity:1}
.card.dragging{opacity:.4;cursor:grabbing;transform:scale(.97)}
.card.drag-ghost{opacity:.2}
.card-del{position:absolute;top:4px;left:4px;background:rgba(0,0,0,.7);border:1px solid #333;color:var(--sub);border-radius:4px;width:17px;height:17px;font-size:9px;cursor:pointer;display:none;align-items:center;justify-content:center;transition:all .2s;z-index:10}
.card:hover .card-del{display:flex}
.card-del:hover{background:#8B2020;color:#fff;border-color:#8B2020}
.icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;background:#222;border:1px solid var(--border)}
.card h2{font-size:11px;font-weight:900;color:var(--gold-l)}
.drag-handle{position:absolute;top:4px;right:4px;color:var(--gold-d);font-size:10px;opacity:0;transition:opacity .2s;cursor:grab}
.card:hover .drag-handle{opacity:1}

/* DROP PLACEHOLDER */
.drop-placeholder{border:2px dashed var(--gold-d);border-radius:var(--r);background:var(--gold-bg);min-height:88px;transition:all .15s}

/* ADD CARD */
.add-card{background:transparent;border:1px dashed var(--gold-d);border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;color:var(--gold-d);font-family:'Tajawal';font-size:11px;font-weight:700;transition:all .2s;padding:14px 8px;min-height:88px}
.add-card:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-bg)}
.add-card .plus{font-size:20px}

/* TASKS */
.tasks-box{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;margin-bottom:8px}
.tasks-box h3{font-size:12px;font-weight:900;margin-bottom:7px;color:var(--gold);display:flex;align-items:center;gap:6px}
.task-row{display:flex;gap:6px;margin-bottom:6px}
.task-inp{flex:1;border:1px solid var(--border);background:#111;color:var(--text);border-radius:6px;padding:6px 12px;font-family:'Tajawal';font-size:11.5px;outline:none;transition:border-color .2s}
.task-inp:focus{border-color:var(--gold-d)}
.task-add{background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-d);padding:0 12px;border-radius:6px;font-family:'Tajawal';font-size:11px;font-weight:700;cursor:pointer;transition:all .2s}
.task-add:hover{background:var(--gold);color:#111}
.tasks-list{list-style:none;display:flex;flex-direction:column;gap:4px;max-height:110px;overflow-y:auto}
.task-li{display:flex;align-items:center;justify-content:space-between;background:#111;padding:5px 10px;border-radius:5px;border:1px solid var(--border)}
.task-li-r{display:flex;align-items:center;gap:8px;font-size:11.5px}
.t-cb{width:14px;height:14px;cursor:pointer;accent-color:var(--gold)}
.t-txt.done{text-decoration:line-through;color:var(--sub)}
.t-del{background:transparent;border:none;cursor:pointer;font-size:13px;color:var(--sub)}
.t-del:hover{color:#c0392b}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.on{opacity:1;pointer-events:all}
.mbox{background:#1C1C1C;border:1px solid var(--gold-d);border-radius:var(--r);padding:22px 24px;width:310px;box-shadow:0 0 40px rgba(212,168,67,.15);transform:translateY(10px);transition:transform .2s}
.overlay.on .mbox{transform:translateY(0)}
.mbox h3{font-size:13px;font-weight:900;color:var(--gold);margin-bottom:14px}
.mf{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.mf label{font-size:11px;font-weight:700;color:var(--sub)}
.mf input{border:1px solid var(--border);background:#111;color:var(--text);border-radius:6px;padding:7px 12px;font-family:'Tajawal';font-size:12px;outline:none;transition:border-color .2s}
.mf input:focus{border-color:var(--gold-d)}
.m-acts{display:flex;gap:8px;margin-top:14px}
.mbtn{flex:1;padding:7px;border-radius:6px;font-family:'Tajawal';font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.mbtn.p{background:var(--gold);color:#111;border:none}.mbtn.p:hover{background:var(--gold-l)}
.mbtn.s{background:transparent;color:var(--sub);border:1px solid var(--border)}.mbtn.s:hover{color:var(--text);border-color:var(--sub)}
.emoji-grid{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;max-height:110px;overflow-y:auto}
.emo{width:30px;height:30px;border-radius:5px;border:1px solid var(--border);background:#111;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.emo:hover,.emo.sel{border-color:var(--gold);background:var(--gold-bg)}

.footer{text-align:center;padding:7px;font-size:10.5px;color:var(--gold-d);border-top:1px solid var(--border);background:var(--bg-card)}
</style>
</head>
<body>

</div>

<!-- TAB MODAL -->
<div class="overlay" id="tabModal">

    <h3>➕ تبويب جديد</h3>
    <div class="mf"><label>الاسم</label><input id="tName" placeholder="مثال: شبكات التواصل"></div>

<script>
// ══════════════════════════════════════════
//  CONFIG — ضع هنا رابط الـ Apps Script بعد النشر
// ══════════════════════════════════════════
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbx_T6TYQhyk20h7YwS1sfvvZ0d1AR0RUY32pohhfDwaGL8SAcLMzRjnorheZBWsOpM/exec';

// ══════════════════════════════════════════
//  PRAYER TIMES
// ══════════════════════════════════════════
let PRAYERS = [];

async function fetchPrayers() {
  try {
    const now = new Date();
    const url = `https://api.aladhan.com/v1/timings/${now.getDate()}-${now.getMonth()+1}-${now.getFullYear()}?latitude=21.3891&longitude=39.8579&method=4`;
    const r = await fetch(url);
    const d = await r.json();
    if (d.code !== 200) throw new Error();
    const T = d.data.timings;
    const raw = { fajr:T.Fajr, dhuhr:T.Dhuhr, asr:T.Asr, maghrib:T.Maghrib, isha:T.Isha };
    localStorage.setItem('p_cache', JSON.stringify(raw));
    const now2 = new Date();
    localStorage.setItem('p_date', `${now2.getFullYear()}-${now2.getMonth()}-${now2.getDate()}`);
    applyPrayerData(raw);
  } catch(e) {
    const raw = JSON.parse(localStorage.getItem('p_cache') || 'null');
    if (raw) applyPrayerData(raw);
  }
}

function applyPrayerData(raw) {
  const names = { fajr:'الفجر', dhuhr:'الظهر', asr:'العصر', maghrib:'المغرب', isha:'العشاء' };
  PRAYERS = Object.entries(raw).map(([key, str]) => {
    const [h, m] = str.split(':').map(Number);
    return { key, name:names[key], h24:str, totalSec:h*3600+m*60 };
  }).sort((a,b) => a.totalSec - b.totalSec);

  const fmt = str => {
    const [h,m] = str.split(':').map(Number);
    const ap = h>=12?'م':'ص'; const h12 = h%12||12;
    return `${h12<10?'0'+h12:h12}:${m<10?'0'+m:m} ${ap}`;
  };
  PRAYERS.forEach(p => {
    const el = document.getElementById(`pt-${p.key}`);
    if (el) el.textContent = fmt(p.h24);
  });
}

function needsPrayerRefetch() {
  const now = new Date();
  return localStorage.getItem('p_date') !== `${now.getFullYear()}-${now.getMonth()}-${now.getDate()}`;
}

// ══════════════════════════════════════════
//  CLOCK + COUNTDOWN
// ══════════════════════════════════════════
function tick() {
  const now = new Date();
  let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  const ap = h>=12?'م':'ص'; h=h%12||12;
  const p = n => n<10?'0'+n:n;
  document.getElementById('liveTime').textContent = `${p(h)}:${p(m)}:${p(s)} ${ap}`;
  document.getElementById('liveDate').textContent = now.toLocaleDateString('ar-SA',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  document.getElementById('liveHijri').textContent = now.toLocaleDateString('ar-SA-u-ca-islamic',{year:'numeric',month:'long',day:'numeric'});
  if (PRAYERS.length) updateCountdown(now);
}

function updateCountdown(now) {
  const nowSec = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();
  document.querySelectorAll('.pi').forEach(el => el.classList.remove('next'));

  // Find next prayer
  let next = null, diffSec = Infinity;
  for (const p of PRAYERS) {
    const d = p.totalSec - nowSec;
    if (d > 0 && d < diffSec) { diffSec = d; next = p; }
  }
  // After Isha → Fajr tomorrow
  if (!next) {
    next = PRAYERS[0];
    diffSec = (86400 - nowSec) + next.totalSec;
  }

  document.getElementById(`pCard-${next.key}`)?.classList.add('next');

  const hrs = Math.floor(diffSec/3600);
  const mins = Math.floor((diffSec%3600)/60);
  const secs = diffSec%60;
  const p2 = n => n<10?'0'+n:n;
  document.getElementById('cdText').innerHTML =
    `متبقي على صلاة ${next.name}: <span>${p2(hrs)}:${p2(mins)}:${p2(secs)}</span>`;

  // ── PROGRESS BAR (accurate window) ──
  const idx = PRAYERS.findIndex(p => p.key === next.key);
  let windowSec, elapsedSec;

  if (idx === 0) {
    // Between Isha (yesterday) and Fajr (today)
    const isha = PRAYERS[PRAYERS.length - 1];
    // window = from Isha to midnight + from midnight to Fajr
    windowSec = (86400 - isha.totalSec) + next.totalSec;
    // elapsed = how far we are into this window
    // If nowSec < fajr, we're past midnight: elapsed = (86400 - isha.totalSec) + nowSec
    // If nowSec >= isha, we haven't crossed midnight yet: elapsed = nowSec - isha.totalSec
    if (nowSec < next.totalSec) {
      elapsedSec = (86400 - isha.totalSec) + nowSec;
    } else {
      elapsedSec = nowSec - isha.totalSec;
    }
  } else {
    const prev = PRAYERS[idx - 1];
    windowSec = next.totalSec - prev.totalSec;
    elapsedSec = nowSec - prev.totalSec;
  }

  const progress = Math.min(100, Math.max(0, (elapsedSec / windowSec) * 100));
  document.getElementById('barFill').style.width = `${progress}%`;
}

// ══════════════════════════════════════════
//  GOOGLE SHEETS SYNC
// ══════════════════════════════════════════
function setSyncStatus(state, msg) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncMsg');
  dot.className = 'sync-dot ' + state;
  txt.textContent = msg;
}

async function pushToSheets(data) {
  if (!SHEETS_URL) return;
  setSyncStatus('loading', 'جاري الحفظ...');
  try {
    await fetch(SHEETS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'save', payload: data })
    });
    setSyncStatus('ok', 'تم الحفظ في Google Sheets ✓');
    setTimeout(() => setSyncStatus('ok', 'متصل بـ Google Sheets'), 2000);
  } catch(e) {
    setSyncStatus('err', 'فشل الحفظ — سيتم المحاولة لاحقاً');
  }
}

async function pullFromSheets() {
  if (!SHEETS_URL) { setSyncStatus('', 'غير متصل — أضف رابط Sheets في الإعدادات'); return null; }
  setSyncStatus('loading', 'جاري التحميل من Sheets...');
  try {
    const res = await fetch(SHEETS_URL + '?action=load', { mode: 'cors' });
    const d = await res.json();
    setSyncStatus('ok', 'متصل بـ Google Sheets');
    return d;
  } catch(e) {
    setSyncStatus('err', 'تعذّر الاتصال — يعمل من التخزين المحلي');
    return null;
  }
}

function buildSavePayload() {
  return { tabs, tasks };
}

function triggerSave() {
  saveTabs();
  pushToSheets(buildSavePayload());
}

// ══════════════════════════════════════════
//  TABS
// ══════════════════════════════════════════
const EMOJIS = ['🌐','📱','💻','🎮','🎵','🎬','📺','🛒','📰','🔗','💡','🏆','📧','🗓️','🔐','💰','📦','🌙','☁️','🔔','🛠️','📡','🎯','🌟','🤖','🔮','✨','▶️','💬','✈️','🌍','🪪','💾','🎨','⚙️','🚀','🧩','📌','🎭','🖼️','✏️','🏠','📊','📅','🏅'];

const DEFAULT_TABS = [
  { id:'work',     label:'العمل',             cards:[
    {id:'kababi',name:'كبابجي',    emoji:'🏠',url:'https://home-m6kn.vercel.app/'},
    {id:'zad',   name:'داش زاد',  emoji:'📊',url:'https://zad-dashboard-v1.vercel.app/'},
    {id:'github',name:'GitHub',    emoji:'⚙️',url:'https://github.com'},
    {id:'vercel',name:'Vercel',    emoji:'🚀',url:'https://vercel.com/'},
  ]},
  { id:'personal', label:'شخصي',              cards:[
    {id:'ana',name:'أنا',emoji:'📅',url:'https://yom-lac.vercel.app/'},
  ]},
  { id:'ai',       label:'الذكاء الاصطناعي', cards:[
    {id:'chatgpt',name:'ChatGPT',emoji:'🤖',url:'https://chatgpt.com/'},
    {id:'claude', name:'Claude', emoji:'🔮',url:'https://claude.ai/'},
    {id:'gemini', name:'Gemini', emoji:'✨',url:'https://gemini.google.com/'},
  ]},
  { id:'social',   label:'التواصل',           cards:[
    {id:'wa',name:'واتساب',  emoji:'💬',url:'https://web.whatsapp.com/'},
    {id:'tg',name:'تيليجرام',emoji:'✈️',url:'https://web.telegram.org/a/'},
    {id:'yt',name:'يوتيوب',  emoji:'▶️',url:'https://www.youtube.com/'},
  ]},
  { id:'tools',    label:'أدوات',             cards:[
    {id:'translate',name:'ترجمة',       emoji:'🌍',url:'https://translate.google.com/?hl=ar'},
    {id:'drive',    name:'درايف',        emoji:'💾',url:'https://drive.google.com'},
    {id:'absher',   name:'أبشر',         emoji:'🪪',url:'https://www.absher.sa'},
    {id:'chrome',   name:'إضافات كروم', emoji:'🧩',url:'https://chromewebstore.google.com/category/extensions'},
  ]},
  { id:'design',   label:'التصميم',           cards:[
    {id:'canva',    name:'كانفا',   emoji:'🎨',url:'https://www.canva.com/ar_eg/'},
    {id:'freepik',  name:'Freepik', emoji:'🎭',url:'https://www.freepik.com/'},
    {id:'pinterest',name:'بينترست',emoji:'📌',url:'https://www.pinterest.com/'},
    {id:'pngwing',  name:'PNGWing', emoji:'🖼️',url:'https://www.pngwing.com/'},
    {id:'vecteezy', name:'Vecteezy',emoji:'✏️',url:'https://www.vecteezy.com'},
  ]},
];

let tabs = [];
let activeTab = null;
let currentCardTab = null;
let selEmoji = '🌐';

// Drag state
let dragCardId = null;
let dragFromTab = null;

function loadTabs() {
  const saved = localStorage.getItem('mnm_tabs_v4');
  tabs = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_TABS));
  if (!saved) saveTabs();
}
function saveTabs() { localStorage.setItem('mnm_tabs_v4', JSON.stringify(tabs)); }

function renderTabs() {
  const nav = document.getElementById('tabsNav');
  const content = document.getElementById('tabsContent');
  if (!activeTab || !tabs.find(t => t.id === activeTab)) activeTab = tabs[0]?.id;

  nav.innerHTML = tabs.map(t =>
    `<button class="tab-btn ${t.id===activeTab?'active':''}" onclick="switchTab('${t.id}')">${t.label}</button>`
  ).join('') + `<button class="tab-add" onclick="openTabModal()" title="تبويب جديد">＋</button>`;

  content.innerHTML = tabs.map(t =>
    `<div class="tab-pane ${t.id===activeTab?'active':''}" id="pane-${t.id}">
       <div class="cards-grid" id="grid-${t.id}" 
         ondragover="onGridDragOver(event,'${t.id}')"
         ondrop="onGridDrop(event,'${t.id}')"
         ondragleave="onGridDragLeave(event,'${t.id}')"></div>
     </div>`
  ).join('');

  tabs.forEach(t => fillGrid(t));
}

function fillGrid(tab) {
  const grid = document.getElementById(`grid-${tab.id}`);
  if (!grid) return;
  grid.innerHTML = '';
  tab.cards.forEach(card => grid.appendChild(createCardEl(card, tab.id)));
  const btn = document.createElement('button');
  btn.className = 'add-card';
  btn.innerHTML = `<span class="plus">＋</span>أضف`;
  btn.onclick = () => openCardModal(tab.id);
  grid.appendChild(btn);
}

function createCardEl(card, tabId) {
  const a = document.createElement('a');
  a.href = card.url;
  a.target = '_blank';
  a.className = 'card';
  a.setAttribute('data-card-id', card.id);
  a.setAttribute('data-tab-id', tabId);
  a.draggable = true;
  a.innerHTML = `
    <span class="drag-handle">⠿</span>
    <button class="card-del" onclick="delCard('${card.id}','${tabId}',event)">✕</button>
    <div class="icon">${card.emoji}</div>
    <h2>${card.name}</h2>`;

  // Drag events
  a.addEventListener('dragstart', e => {
    dragCardId = card.id;
    dragFromTab = tabId;
    a.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', card.id);
  });
  a.addEventListener('dragend', () => {
    a.classList.remove('dragging');
    document.querySelectorAll('.drop-placeholder').forEach(p => p.remove());
    document.querySelectorAll('.cards-grid').forEach(g => g.classList.remove('drag-over'));
  });

  // Prevent link navigation on drag
  a.addEventListener('click', e => { if (a.classList.contains('dragging')) e.preventDefault(); });

  return a;
}

// Grid drag events
function onGridDragOver(e, tabId) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const grid = document.getElementById(`grid-${tabId}`);
  grid.classList.add('drag-over');

  // Find insertion point
  const afterEl = getDragAfterElement(grid, e.clientX);
  const placeholder = document.querySelector('.drop-placeholder');
  const ph = placeholder || (() => {
    const d = document.createElement('div');
    d.className = 'drop-placeholder';
    return d;
  })();
  if (afterEl == null) grid.insertBefore(ph, grid.querySelector('.add-card'));
  else grid.insertBefore(ph, afterEl);
}

function onGridDragLeave(e, tabId) {
  const grid = document.getElementById(`grid-${tabId}`);
  if (!grid.contains(e.relatedTarget)) {
    grid.classList.remove('drag-over');
    document.querySelectorAll('.drop-placeholder').forEach(p => p.remove());
  }
}

function onGridDrop(e, toTabId) {
  e.preventDefault();
  document.querySelectorAll('.drop-placeholder').forEach(p => p.remove());
  document.querySelectorAll('.cards-grid').forEach(g => g.classList.remove('drag-over'));
  if (!dragCardId) return;

  const fromTab = tabs.find(t => t.id === dragFromTab);
  const toTab   = tabs.find(t => t.id === toTabId);
  if (!fromTab || !toTab) return;

  const cardIdx = fromTab.cards.findIndex(c => String(c.id) === String(dragCardId));
  if (cardIdx === -1) return;
  const [card] = fromTab.cards.splice(cardIdx, 1);

  // Find drop position in toTab
  const grid = document.getElementById(`grid-${toTabId}`);
  const afterEl = getDragAfterElement(grid, e.clientX);
  if (afterEl == null || afterEl.classList.contains('add-card')) {
    toTab.cards.push(card);
  } else {
    const afterId = afterEl.getAttribute('data-card-id');
    const afterIdx = toTab.cards.findIndex(c => String(c.id) === String(afterId));
    toTab.cards.splice(afterIdx, 0, card);
  }

  dragCardId = null; dragFromTab = null;
  triggerSave();
  fillGrid(fromTab);
  if (fromTab.id !== toTab.id) fillGrid(toTab);
}

function getDragAfterElement(grid, x) {
  const cards = [...grid.querySelectorAll('.card:not(.dragging)')];
  return cards.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    // RTL: measure from right edge
    const offset = x - box.right + box.width / 2;
    if (offset < 0 && offset > closest.offset) return { offset, element: child };
    return closest;
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}

function switchTab(id) {
  activeTab = id;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  // Re-render nav to update active
  const nav = document.getElementById('tabsNav');
  nav.querySelectorAll('.tab-btn').forEach(b => {
    if (b.getAttribute('onclick') === `switchTab('${id}')`) b.classList.add('active');
  });
  document.getElementById(`pane-${id}`)?.classList.add('active');
}

function delCard(cardId, tabId, e) {
  e.preventDefault(); e.stopPropagation();
  if (!confirm('حذف هذا الكرت؟')) return;
  const tab = tabs.find(t => t.id === tabId);
  if (tab) tab.cards = tab.cards.filter(c => String(c.id) !== String(cardId));
  triggerSave(); fillGrid(tab);
}

// ── Card Modal
function openCardModal(tabId) {
  currentCardTab = tabId; selEmoji = '🌐';
  document.getElementById('mName').value = '';
  document.getElementById('mUrl').value = '';
  buildEmojiGrid();
  document.getElementById('cardModal').classList.add('on');
  document.getElementById('mName').focus();
}
function closeCardModal() { document.getElementById('cardModal').classList.remove('on'); }
document.getElementById('cardModal').addEventListener('click', e => { if(e.target===document.getElementById('cardModal')) closeCardModal(); });

function buildEmojiGrid() {
  document.getElementById('emojiGrid').innerHTML = EMOJIS.map(em =>
    `<div class="emo ${em===selEmoji?'sel':''}" onclick="pickEmoji('${em}',this)">${em}</div>`
  ).join('');
}
function pickEmoji(em, el) {
  selEmoji = em;
  document.querySelectorAll('.emo').forEach(e => e.classList.remove('sel'));
  el.classList.add('sel');
}
function saveCard() {
  const name = document.getElementById('mName').value.trim();
  let url = document.getElementById('mUrl').value.trim();
  if (!name || !url) { alert('يرجى تعبئة الاسم والرابط'); return; }
  if (!url.startsWith('http')) url = 'https://' + url;
  const tab = tabs.find(t => t.id === currentCardTab);
  if (tab) tab.cards.push({ id: Date.now(), name, url, emoji: selEmoji });
  triggerSave(); closeCardModal(); fillGrid(tab);
}

// ── Tab Modal
function openTabModal() {
  document.getElementById('tName').value = '';
  document.getElementById('tabModal').classList.add('on');
  document.getElementById('tName').focus();
}
function closeTabModal() { document.getElementById('tabModal').classList.remove('on'); }
document.getElementById('tabModal').addEventListener('click', e => { if(e.target===document.getElementById('tabModal')) closeTabModal(); });
function saveTab() {
  const name = document.getElementById('tName').value.trim();
  if (!name) return;
  const id = 'tab_' + Date.now();
  tabs.push({ id, label: name, cards: [] });
  triggerSave(); closeTabModal(); renderTabs(); switchTab(id);
}

// ══════════════════════════════════════════
//  TASKS
// ══════════════════════════════════════════
let tasks = JSON.parse(localStorage.getItem('mnm_tasks') || '[]');
function saveTasks() { localStorage.setItem('mnm_tasks', JSON.stringify(tasks)); }
function addTask() {
  const inp = document.getElementById('taskInp');
  const txt = inp.value.trim();
  if (!txt) return;
  tasks.push({ id: Date.now(), text: txt, done: false });
  inp.value = ''; triggerSave(); renderTasks();
}
function toggleTask(id) {
  tasks = tasks.map(t => t.id===id?{...t,done:!t.done}:t);
  saveTasks(); renderTasks();
}
function delTask(id) {
  tasks = tasks.filter(t => t.id!==id);
  saveTasks(); renderTasks();
}
function renderTasks() {
  const el = document.getElementById('tasksList');
  if (!el) return;
  if (!tasks.length) { el.innerHTML='<li style="text-align:center;padding:6px;color:var(--sub);font-size:11px;">✦ لا توجد مهام حالياً</li>'; return; }
  el.innerHTML = tasks.map(t=>`
    <li class="task-li">
      <div class="task-li-r">
        <input type="checkbox" class="t-cb" ${t.done?'checked':''} onchange="toggleTask(${t.id})">
        <span class="t-txt ${t.done?'done':''}">${t.text}</span>
      </div>
      <button class="t-del" onclick="delTask(${t.id})">✕</button>
    </li>`).join('');
}
document.getElementById('taskInp')?.addEventListener('keypress', e => { if(e.key==='Enter') addTask(); });

// ══════════════════════════════════════════
//  SHEETS URL SETUP (first visit prompt)
// ══════════════════════════════════════════
function checkSheetsSetup() {
  if (!SHEETS_URL) {
    // Show a subtle prompt after 2s if no URL configured
    setTimeout(() => {
      const msg = document.getElementById('syncMsg');
      msg.style.cursor = 'pointer';
      msg.title = 'انقر لإضافة رابط Google Sheets';
      msg.onclick = () => {
        const url = prompt('الصق رابط نشر Apps Script هنا (من Google Sheets):\n\nاتبع الإرشادات في ملف apps-script.gs');
        if (url && url.startsWith('https://')) {
          localStorage.setItem('mnm_sheets_url', url);
          location.reload();
        }
      };
    }, 2000);
  }
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
setInterval(tick, 1000);

window.addEventListener('DOMContentLoaded', async () => {
  tick();
  loadTabs();

  // Try loading from Sheets first, fallback to localStorage
  if (SHEETS_URL) {
    const remote = await pullFromSheets();
    if (remote && remote.tabs) {
      tabs = remote.tabs;
      saveTabs();
    }
    if (remote && remote.tasks) {
      tasks = remote.tasks;
      saveTasks();
    }
  }

  renderTabs();
  renderTasks();


  // Prayer times
  if (needsPrayerRefetch()) {
    await fetchPrayers();
  } else {
    const raw = JSON.parse(localStorage.getItem('p_cache')||'null');
    if (raw) applyPrayerData(raw);
  }

  // Midnight prayer refresh
  const now = new Date();
  const msToMidnight = new Date(now.getFullYear(),now.getMonth(),now.getDate()+1,0,1,0) - now;
  setTimeout(async () => { await fetchPrayers(); }, msToMidnight);
});

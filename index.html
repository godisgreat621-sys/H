<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة محمد النمري</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0D0D0D;--bg-card:#161616;--text:#F0EDE6;--sub:#A89B8A;
  --border:#2A2520;--gold:#D4A843;--gold-l:#F0C866;--gold-d:#8A6E2A;
  --gold-bg:rgba(212,168,67,0.07);--r:10px;--sh:0 4px 24px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;direction:rtl;display:flex;flex-direction:column}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--gold-d);border-radius:4px}
.hero{background:var(--bg-card);text-align:center;padding:12px 20px 10px;border-bottom:1px solid var(--border);border-radius:0 0 var(--r) var(--r);box-shadow:var(--sh);position:relative}
.hero::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,var(--gold-d),transparent)}
.brand{font-size:26px;font-weight:900;background:linear-gradient(135deg,var(--gold-l),var(--gold),var(--gold-d));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:1px}
.hero h1{font-size:11px;color:var(--sub);margin-bottom:10px}
.clock-panel{display:inline-flex;align-items:center;gap:14px;background:#111;padding:5px 16px;border-radius:30px;margin-bottom:10px;border:1px solid var(--border)}
.live-time{font-size:15px;font-weight:900;color:var(--gold-l);font-family:'Courier New',monospace;letter-spacing:1px}
.live-date{font-size:10.5px;font-weight:700;color:#5A9E6A;border-right:1px solid var(--border);padding-right:12px}
.live-hijri{font-size:10.5px;font-weight:700;color:#B07055;border-right:1px solid var(--border);padding-right:12px}
.prayer-bar{background:#111;border:1px solid var(--border);padding:8px 14px;border-radius:8px;max-width:820px;margin:0 auto}
.prayers-row{display:flex;justify-content:center;align-items:center;gap:8px;flex-wrap:nowrap}
.prayer-lbl{font-size:10.5px;font-weight:900;color:var(--gold-d);white-space:nowrap}
.pi{font-size:10.5px;font-weight:700;display:inline-flex;align-items:center;gap:3px;padding:4px 9px;background:#1C1A16;color:#9A8B77;border-radius:5px;white-space:nowrap;border:1px solid transparent;transition:all .3s}
.pi span{font-family:monospace;font-weight:bold}
.pi.next{border-color:var(--gold-d);color:var(--gold-l);box-shadow:0 0 8px rgba(212,168,67,.2)}
.pi.next span{color:var(--gold)}
.countdown-row{margin-top:7px;padding-top:6px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:12px}
.cd-text{font-size:10.5px;font-weight:700;color:var(--sub)}
.cd-text span{color:var(--gold);font-weight:900;font-family:monospace}
.bar-bg{width:160px;height:4px;background:var(--border);border-radius:10px;overflow:hidden}
.bar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--gold-d),var(--gold));border-radius:10px;transition:width .5s ease}
.sync-bar{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:6px 0 0;font-size:10px;color:var(--sub)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#555;transition:background .3s}
.sync-dot.ok{background:#4CAF50}
.sync-dot.err{background:#c0392b}
.sync-dot.loading{background:var(--gold);animation:pulse .8s infinite alternate}
@keyframes pulse{to{opacity:.3}}
.wrap{flex:1;max-width:1000px;width:100%;margin:0 auto;padding:10px 18px}

/* ── TABS NAV ── */
.tabs-nav{display:flex;gap:4px;margin-bottom:12px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;align-items:center}
.tabs-nav::-webkit-scrollbar{display:none}
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;color:var(--sub);font-family:'Tajawal';font-size:12px;font-weight:700;padding:7px 10px;cursor:pointer;white-space:nowrap;transition:all .2s;margin-bottom:-1px;display:flex;align-items:center;gap:5px;position:relative;border-radius:6px 6px 0 0}
.tab-btn:hover{color:var(--gold-l);background:var(--gold-bg)}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-btn.tab-dragging{opacity:.4}
.tab-btn.tab-drag-over{border-right:2px solid var(--gold);background:var(--gold-bg)}
/* rename + delete on hover */
.tab-del-btn{display:none}
.tab-add{background:none;border:none;color:var(--gold-d);font-size:18px;cursor:pointer;padding:2px 8px;margin-bottom:-1px;transition:color .2s;line-height:1}
.tab-add:hover{color:var(--gold)}
.tab-pane{display:none}
.tab-pane.active{display:block}

/* ── CARDS GRID ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-bottom:12px;min-height:50px;position:relative}
.cards-grid.drag-over{background:rgba(212,168,67,.04);border-radius:var(--r);outline:1px dashed var(--gold-d)}
.card{background:var(--bg-card);border-radius:var(--r);padding:14px 8px 12px;text-align:center;border:1px solid var(--border);text-decoration:none;color:var(--text);display:flex;flex-direction:column;align-items:center;gap:6px;transition:border-color .22s,box-shadow .22s;position:relative;overflow:hidden;cursor:grab;user-select:none}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold-d);opacity:0;transition:opacity .3s}
.card:hover{border-color:var(--gold-d);box-shadow:0 0 20px rgba(212,168,67,.15)}
.card:hover::before{opacity:1}
.card.dragging{opacity:.4;cursor:grabbing;transform:scale(.97)}
/* action buttons on card */
.card-actions{display:none}
.icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;background:#222;border:1px solid var(--border)}
.card h2{font-size:11px;font-weight:900;color:var(--gold-l)}
.drag-handle{position:absolute;top:4px;right:4px;color:var(--gold-d);font-size:10px;opacity:0;transition:opacity .2s;cursor:grab}
.card:hover .drag-handle{opacity:1}
.drop-placeholder{border:2px dashed var(--gold-d);border-radius:var(--r);background:var(--gold-bg);min-height:88px;transition:all .15s}
.add-card{background:transparent;border:1px dashed var(--gold-d);border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;color:var(--gold-d);font-family:'Tajawal';font-size:11px;font-weight:700;transition:all .2s;padding:14px 8px;min-height:88px}
.add-card:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-bg)}
.add-card .plus{font-size:20px}

/* ── QUICK PASTE ZONE ── */
.paste-zone{background:#111;border:1px dashed #3a3530;border-radius:8px;padding:7px 12px;margin-bottom:8px;display:flex;align-items:center;gap:8px;cursor:text;transition:border-color .2s}
.paste-zone:focus-within{border-color:var(--gold-d)}
.paste-inp{flex:1;background:none;border:none;color:var(--sub);font-family:'Tajawal';font-size:11px;outline:none}
.paste-inp::placeholder{color:#4a4540}
.paste-inp:focus::placeholder{color:#6a6560}
.paste-hint{font-size:10px;color:#4a4540;white-space:nowrap}

/* ── TASKS ── */
.tasks-box{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;margin-bottom:8px}
.tasks-box h3{font-size:12px;font-weight:900;margin-bottom:7px;color:var(--gold);display:flex;align-items:center;gap:6px}
.task-row{display:flex;gap:6px;margin-bottom:6px}
.task-inp{flex:1;border:1px solid var(--border);background:#111;color:var(--text);border-radius:6px;padding:6px 12px;font-family:'Tajawal';font-size:11.5px;outline:none;transition:border-color .2s}
.task-inp:focus{border-color:var(--gold-d)}
.task-add{background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-d);padding:0 12px;border-radius:6px;font-family:'Tajawal';font-size:11px;font-weight:700;cursor:pointer;transition:all .2s}
.task-add:hover{background:var(--gold);color:#111}
.tasks-list{list-style:none;display:flex;flex-direction:column;gap:4px;max-height:110px;overflow-y:auto}
.task-li{display:flex;align-items:center;justify-content:space-between;background:#111;padding:5px 10px;border-radius:5px;border:1px solid var(--border)}
.task-li-r{display:flex;align-items:center;gap:8px;font-size:11.5px}
.t-cb{width:14px;height:14px;cursor:pointer;accent-color:var(--gold)}
.t-txt.done{text-decoration:line-through;color:var(--sub)}
.t-del{background:transparent;border:none;cursor:pointer;font-size:13px;color:var(--sub)}
.t-del:hover{color:#c0392b}

/* ── MODALS ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.on{opacity:1;pointer-events:all}
.mbox{background:#1C1C1C;border:1px solid var(--gold-d);border-radius:var(--r);padding:22px 24px;width:340px;box-shadow:0 0 40px rgba(212,168,67,.15);transform:translateY(10px);transition:transform .2s}
.overlay.on .mbox{transform:translateY(0)}
.mbox h3{font-size:13px;font-weight:900;color:var(--gold);margin-bottom:14px}
.mf{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.mf label{font-size:11px;font-weight:700;color:var(--sub)}
.mf input{border:1px solid var(--border);background:#111;color:var(--text);border-radius:6px;padding:7px 12px;font-family:'Tajawal';font-size:12px;outline:none;transition:border-color .2s}
.mf input:focus{border-color:var(--gold-d)}
.m-acts{display:flex;gap:8px;margin-top:14px}
.mbtn{flex:1;padding:7px;border-radius:6px;font-family:'Tajawal';font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.mbtn.p{background:var(--gold);color:#111;border:none}.mbtn.p:hover{background:var(--gold-l)}
.mbtn.s{background:transparent;color:var(--sub);border:1px solid var(--border)}.mbtn.s:hover{color:var(--text);border-color:var(--sub)}

/* ── EMOJI GRID – bigger ── */
.emoji-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;max-height:160px;overflow-y:auto;padding:2px}
.emo{width:40px;height:40px;border-radius:7px;border:1px solid var(--border);background:#111;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.emo:hover,.emo.sel{border-color:var(--gold);background:var(--gold-bg);transform:scale(1.1)}


/* ── CONTEXT MENU ── */
.ctx-menu{position:fixed;background:#1e1c18;border:1px solid var(--gold-d);border-radius:8px;padding:4px;min-width:150px;box-shadow:0 8px 32px rgba(0,0,0,.7);z-index:9999;opacity:0;transform:scale(.95);pointer-events:none;transition:opacity .12s,transform .12s;transform-origin:top right}
.ctx-menu.open{opacity:1;transform:scale(1);pointer-events:all}
.ctx-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;color:var(--sub);transition:all .15s;white-space:nowrap}
.ctx-item:hover{background:var(--gold-bg);color:var(--gold-l)}
.ctx-item.danger:hover{background:rgba(180,40,40,.15);color:#f77}
.ctx-item .ctx-icon{font-size:13px;width:16px;text-align:center}
.ctx-sep{height:1px;background:var(--border);margin:3px 6px}
.footer{text-align:center;padding:7px;font-size:10.5px;color:var(--gold-d);border-top:1px solid var(--border);background:var(--bg-card)}

/* ── TAB RENAME INLINE INPUT ── */
.tab-rename-inp{background:#111;border:1px solid var(--gold-d);color:var(--gold);border-radius:4px;padding:2px 7px;font-family:'Tajawal';font-size:12px;font-weight:700;outline:none;width:90px}
</style>
</head>
<body>

<div class="hero">
  <div class="brand">محمد النمري</div>
  <h1>المركز الرقمي الموحد</h1>
  <div class="clock-panel">
    <div class="live-time" id="liveTime">00:00:00 ص</div>
    <div class="live-date" id="liveDate">...</div>
    <div class="live-hijri" id="liveHijri">...</div>
  </div>
  <div class="prayer-bar">
    <div class="prayers-row">
      <div class="prayer-lbl">🕌 مواقيت الصلاة:</div>
      <div class="pi" id="pCard-fajr">الفجر <span id="pt-fajr">--:--</span></div>
      <div class="pi" id="pCard-dhuhr">الظهر <span id="pt-dhuhr">--:--</span></div>
      <div class="pi" id="pCard-asr">العصر <span id="pt-asr">--:--</span></div>
      <div class="pi" id="pCard-maghrib">المغرب <span id="pt-maghrib">--:--</span></div>
      <div class="pi" id="pCard-isha">العشاء <span id="pt-isha">--:--</span></div>
    </div>
    <div class="countdown-row">
      <div class="cd-text" id="cdText">جاري التحميل...</div>
      <div class="bar-bg"><div class="bar-fill" id="barFill"></div></div>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="sync-bar">
    <span id="syncMsg">جاري الاتصال...</span>
    <div class="sync-dot loading" id="syncDot"></div>
  </div>
  <div class="tabs-nav" id="tabsNav"></div>
  <div id="tabsContent"></div>
  <div class="tasks-box">
    <h3>✦ قائمة المهام</h3>
    <div class="task-row">
      <input type="text" id="taskInp" class="task-inp" placeholder="اكتب المهمة هنا...">
      <button class="task-add" onclick="addTask()">➕</button>
    </div>
    <ul class="tasks-list" id="tasksList"></ul>
  </div>
</div>

<div class="footer">✦ محمد النمري ✦ المركز الرقمي الموحد ✦</div>

<!-- CARD MODAL (add + edit) -->
<div class="overlay" id="cardModal">
  <div class="mbox">
    <h3 id="cardModalTitle">➕ إضافة كرت</h3>
    <div class="mf"><label>الاسم</label><input id="mName" placeholder="مثال: نتفليكس"></div>
    <div class="mf"><label>الرابط</label><input id="mUrl" placeholder="https://..."></div>
    <div class="mf"><label>الأيقونة</label><div class="emoji-grid" id="emojiGrid"></div></div>
    <div class="m-acts">
      <button class="mbtn p" onclick="saveCard()">حفظ</button>
      <button class="mbtn s" onclick="closeCardModal()">إلغاء</button>
    </div>
  </div>
</div>

<!-- TAB MODAL -->
<div class="overlay" id="tabModal">
  <div class="mbox">
    <h3>➕ تبويب جديد</h3>
    <div class="mf"><label>الاسم</label><input id="tName" placeholder="مثال: شبكات التواصل"></div>
    <div class="m-acts">
      <button class="mbtn p" onclick="saveTab()">إضافة</button>
      <button class="mbtn s" onclick="closeTabModal()">إلغاء</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbx_T6TYQhyk20h7YwS1sfvvZ0d1AR0RUY32pohhfDwaGL8SAcLMzRjnorheZBWsOpM/exec';

// ══════════════════════════════════════════
//  PRAYER TIMES
// ══════════════════════════════════════════
let PRAYERS = [];

async function fetchPrayers() {
  try {
    const now = new Date();
    const url = `https://api.aladhan.com/v1/timings/${now.getDate()}-${now.getMonth()+1}-${now.getFullYear()}?latitude=21.3891&longitude=39.8579&method=4`;
    const r = await fetch(url);
    const d = await r.json();
    if (d.code !== 200) throw new Error();
    const T = d.data.timings;
    const raw = { fajr:T.Fajr, dhuhr:T.Dhuhr, asr:T.Asr, maghrib:T.Maghrib, isha:T.Isha };
    localStorage.setItem('p_cache', JSON.stringify(raw));
    const now2 = new Date();
    localStorage.setItem('p_date', `${now2.getFullYear()}-${now2.getMonth()}-${now2.getDate()}`);
    applyPrayerData(raw);
  } catch(e) {
    const raw = JSON.parse(localStorage.getItem('p_cache') || 'null');
    if (raw) applyPrayerData(raw);
  }
}

function applyPrayerData(raw) {
  const meta = {
    fajr:    { name:'الفجر',   nextWindow: 8   },
    dhuhr:   { name:'الظهر',   nextWindow: 3.3 },
    asr:     { name:'العصر',   nextWindow: 3.3 },
    maghrib: { name:'المغرب',  nextWindow: 1.5 },
    isha:    { name:'العشاء',  nextWindow: 7.6 }
  };
  PRAYERS = Object.entries(raw).map(([key, str]) => {
    const [h, m] = str.split(':').map(Number);
    return { key, name: meta[key].name, nextWindow: meta[key].nextWindow,
             h24: str, totalSec: h*3600 + m*60 };
  }).sort((a,b) => a.totalSec - b.totalSec);
  const fmt = str => {
    const [h,m] = str.split(':').map(Number);
    const ap = h>=12?'م':'ص'; const h12 = h%12||12;
    return `${h12<10?'0'+h12:h12}:${m<10?'0'+m:m} ${ap}`;
  };
  PRAYERS.forEach(p => {
    const el = document.getElementById(`pt-${p.key}`);
    if (el) el.textContent = fmt(p.h24);
  });
}

function needsPrayerRefetch() {
  const now = new Date();
  return localStorage.getItem('p_date') !== `${now.getFullYear()}-${now.getMonth()}-${now.getDate()}`;
}

// ══════════════════════════════════════════
//  CLOCK + COUNTDOWN
// ══════════════════════════════════════════
function tick() {
  const now = new Date();
  let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  const ap = h>=12?'م':'ص'; h=h%12||12;
  const p = n => n<10?'0'+n:n;
  document.getElementById('liveTime').textContent = `${p(h)}:${p(m)}:${p(s)} ${ap}`;
  document.getElementById('liveDate').textContent = now.toLocaleDateString('ar-SA',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  document.getElementById('liveHijri').textContent = now.toLocaleDateString('ar-SA-u-ca-islamic',{year:'numeric',month:'long',day:'numeric'});
  if (PRAYERS.length) updateCountdown(now);
}

function updateCountdown(now) {
  const nowSec = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();
  document.querySelectorAll('.pi').forEach(el => el.classList.remove('next'));
  let next = null, diffSec = Infinity;
  for (const p of PRAYERS) {
    const d = p.totalSec - nowSec;
    if (d > 0 && d < diffSec) { diffSec = d; next = p; }
  }
  if (!next) { next = PRAYERS[0]; diffSec = (86400 - nowSec) + next.totalSec; }
  document.getElementById(`pCard-${next.key}`)?.classList.add('next');
  const hrs  = Math.floor(diffSec / 3600);
  const mins = Math.floor((diffSec % 3600) / 60);
  const secs = diffSec % 60;
  const p2 = n => n < 10 ? '0'+n : n;
  document.getElementById('cdText').innerHTML =
    `متبقي على صلاة ${next.name}: <span>${p2(hrs)}:${p2(mins)}:${p2(secs)}</span>`;
  const idx = PRAYERS.findIndex(p => p.key === next.key);
  const prevIdx = idx === 0 ? PRAYERS.length - 1 : idx - 1;
  const prev = PRAYERS[prevIdx];
  const totalWindowMs = prev.nextWindow * 3600 * 1000;
  const remainMs = diffSec * 1000;
  const elapsedMs = totalWindowMs - remainMs;
  let progress = (elapsedMs / totalWindowMs) * 100;
  if (progress < 0) progress = 0;
  if (progress > 100) progress = 100;
  document.getElementById('barFill').style.width = `${progress}%`;
}

// ══════════════════════════════════════════
//  SHEETS SYNC
// ══════════════════════════════════════════
function setSyncStatus(state, msg) {
  document.getElementById('syncDot').className = 'sync-dot ' + state;
  document.getElementById('syncMsg').textContent = msg;
}

function jsonpFetch(url) {
  return new Promise((resolve, reject) => {
    const cbName = '__cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const script = document.createElement('script');
    const timer = setTimeout(() => { cleanup(); reject(new Error('JSONP timeout')); }, 12000);
    window[cbName] = (data) => { cleanup(); resolve(data); };
    function cleanup() { clearTimeout(timer); delete window[cbName]; script.parentNode && script.parentNode.removeChild(script); }
    const sep = url.includes('?') ? '&' : '?';
    script.src = `${url}${sep}callback=${cbName}`;
    script.onerror = () => { cleanup(); reject(new Error('script load error')); };
    document.head.appendChild(script);
  });
}

async function pushToSheets(data) {
  if (!SHEETS_URL) return;
  setSyncStatus('loading', 'جاري الحفظ...');
  try {
    await fetch(SHEETS_URL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'save', payload: data })
    });
    setSyncStatus('ok', 'تم الحفظ في Google Sheets ✓');
    setTimeout(() => setSyncStatus('ok', 'متصل بـ Google Sheets'), 2500);
  } catch(e) {
    setSyncStatus('err', 'فشل الحفظ — البيانات محفوظة محلياً');
  }
}

async function pullFromSheets() {
  if (!SHEETS_URL) { setSyncStatus('', 'غير متصل بـ Sheets'); return null; }
  setSyncStatus('loading', 'جاري التحميل من Sheets...');
  try {
    const d = await jsonpFetch(SHEETS_URL + '?action=load');
    setSyncStatus('ok', 'متصل بـ Google Sheets ✓');
    return d;
  } catch(e) {
    try {
      const res = await fetch(SHEETS_URL + '?action=load');
      const d = await res.json();
      setSyncStatus('ok', 'متصل بـ Google Sheets ✓');
      return d;
    } catch(e2) {
      setSyncStatus('err', 'يعمل محلياً — تعذّر الاتصال بـ Sheets');
      return null;
    }
  }
}

function triggerSave() { saveTabs(); pushToSheets(buildSavePayload()); }

function renderTabs() {
  const nav = document.getElementById('tabsNav');
  const content = document.getElementById('tabsContent');
  if (!activeTab || !tabs.find(t => t.id === activeTab)) activeTab = tabs[0]?.id;

  nav.innerHTML = '';
  tabs.forEach(tab => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (tab.id === activeTab ? ' active' : '');
    btn.setAttribute('data-tab-id', tab.id);
    btn.draggable = true;
    btn.title = 'انقر مرتين لتعديل الاسم';
    btn.innerHTML = `
      <span class="tab-label-txt">${tab.label}</span>
      ${tabs.length > 1 ? `<button class="tab-del-btn" title="حذف القسم" onclick="deleteTab('${tab.id}',event)">✕</button>` : ''}
    `;
    btn.addEventListener('click', e => {
      if (e.target.classList.contains('tab-del-btn')) return;
      if (e.target.classList.contains('tab-rename-inp')) return;
      switchTab(tab.id);
    });
    btn.addEventListener('dblclick', e => {
      if (e.target.classList.contains('tab-del-btn')) return;
      startRenameTab(tab.id, e);
    });
    // tab drag events
    btn.addEventListener('dragstart', e => {
      dragTabId = tab.id;
      btn.classList.add('tab-dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', 'tab:' + tab.id);
    });
    btn.addEventListener('dragend', () => {
      btn.classList.remove('tab-dragging');
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-drag-over'));
      dragTabId = null;
    });
    btn.addEventListener('dragover', e => {
      if (!dragTabId || dragTabId === tab.id) return;
      e.preventDefault();
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-drag-over'));
      btn.classList.add('tab-drag-over');
    });
    btn.addEventListener('drop', e => {
      e.preventDefault();
      btn.classList.remove('tab-drag-over');
      if (!dragTabId || dragTabId === tab.id) return;
      const fromIdx = tabs.findIndex(t => t.id === dragTabId);
      const toIdx   = tabs.findIndex(t => t.id === tab.id);
      if (fromIdx < 0 || toIdx < 0) return;
      const [moved] = tabs.splice(fromIdx, 1);
      tabs.splice(toIdx, 0, moved);
      triggerSave();
      renderTabs();
    });
    btn.addEventListener('contextmenu', e => {
      e.stopPropagation();
      const items = [
        { icon:'✎', label:'تعديل الاسم', action:{ type:'renameTab', tabId:tab.id } },
        { icon:'➕', label:'إضافة كرت',  action:{ type:'addCard',   tabId:tab.id } },
      ];
      if (tabs.length > 1) {
        items.push('sep');
        items.push({ icon:'✕', label:'حذف القسم', action:{ type:'delTab', tabId:tab.id }, danger:true });
      }
      showCtx(e, items);
    });
    nav.appendChild(btn);
  });

  addBtn.textContent = '＋';

         <span class="paste-hint">Ctrl+V أو اكتب واضغط Enter</span>
       </div>
       <div class="cards-grid" id="grid-${t.id}"
         ondragover="onGridDragOver(event,'${t.id}')"
         ondrop="onGridDrop(event,'${t.id}')"
         ondragleave="onGridDragLeave(event,'${t.id}')"></div>
     </div>`
  ).join('');

  });

// ══════════════════════════════════════════
function setupPasteZone(tabId) {
  const inp = document.getElementById(`paste-inp-${tabId}`);
  if (!inp) return;

  // Detect paste event
  inp.addEventListener('paste', e => {
    setTimeout(() => {
      const val = inp.value.trim();
      if (val) quickAddFromPaste(tabId, val, inp);
    }, 10);
  });

  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const val = inp.value.trim();
      if (val) quickAddFromPaste(tabId, val, inp);
    }
  });
}

function quickAddFromPaste(tabId, raw, inp) {
  let url = raw;
  if (!url.startsWith('http')) url = 'https://' + url;

  // Try to extract a readable name from URL
  let name = '🔗 رابط جديد';
  try {
    const u = new URL(url);
    name = u.hostname.replace(/^www\./, '');
  } catch(e) {}

  // Add card immediately with auto-detected name
  const tab = tabs.find(t => t.id === tabId);
  if (!tab) return;
  const newCard = { id: Date.now(), name, url, emoji: '🔗' };
  tab.cards.push(newCard);
  triggerSave();
  fillGrid(tab);
  inp.value = '';

  // Flash feedback
  const zone = document.getElementById(`paste-zone-${tabId}`);
  if (zone) {
    zone.style.borderColor = 'var(--gold)';
    zone.style.background = 'rgba(212,168,67,0.06)';
    setTimeout(() => {
      zone.style.borderColor = '';
      zone.style.background = '';
    }, 800);
  }

  // Immediately open edit modal for the new card so user can refine name+emoji
  openCardModal(tabId, newCard.id);
}

//  FILL GRID
// ══════════════════════════════════════════
function fillGrid(tab) {
  const grid = document.getElementById(`grid-${tab.id}`);
  if (!grid) return;
  grid.innerHTML = '';
  tab.cards.forEach(card => grid.appendChild(createCardEl(card, tab.id)));
  const btn = document.createElement('button');
  btn.className = 'add-card';
  btn.innerHTML = `<span class="plus">＋</span>أضف`;
  btn.onclick = () => openCardModal(tab.id, null);
  grid.appendChild(btn);
}

function createCardEl(card, tabId) {
  const a = document.createElement('a');
  a.href = card.url;
  a.target = '_blank';
  a.className = 'card';
  a.setAttribute('data-card-id', card.id);
  a.setAttribute('data-tab-id', tabId);
  a.draggable = true;
  a.innerHTML = `
    <span class="drag-handle">⠿</span>
    <div class="card-actions">
      <button class="card-act-btn edit" title="تعديل" onclick="editCard('${card.id}','${tabId}',event)">✎</button>
      <button class="card-act-btn del" title="حذف" onclick="delCard('${card.id}','${tabId}',event)">✕</button>
    </div>
    <div class="icon">${card.emoji}</div>
    <h2>${card.name}</h2>`;
  a.addEventListener('dragstart', e => {
    dragCardId = card.id; dragFromTab = tabId;
    a.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', card.id);
  });
  a.addEventListener('dragend', () => {
    a.classList.remove('dragging');
    document.querySelectorAll('.drop-placeholder').forEach(p => p.remove());
    document.querySelectorAll('.cards-grid').forEach(g => g.classList.remove('drag-over'));
  });
  a.addEventListener('click', e => { if (a.classList.contains('dragging')) e.preventDefault(); });
  a.addEventListener('contextmenu', e => {
    showCtx(e, [
      { icon:'✎', label:'تعديل الكرت',  action:{ type:'editCard', cardId:card.id, tabId } },
      'sep',
      { icon:'✕', label:'حذف الكرت',   action:{ type:'delCard',  cardId:card.id, tabId }, danger:true },
    ]);
  });
  return a;
}

// ══════════════════════════════════════════
//  CARD DRAG & DROP
// ══════════════════════════════════════════
function onGridDragOver(e, tabId) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const grid = document.getElementById(`grid-${tabId}`);
  grid.classList.add('drag-over');
  const afterEl = getDragAfterElement(grid, e.clientX);
  const ph = document.querySelector('.drop-placeholder') || (() => {
    const d = document.createElement('div'); d.className = 'drop-placeholder'; return d;
  })();
  if (afterEl == null) grid.insertBefore(ph, grid.querySelector('.add-card'));
  else grid.insertBefore(ph, afterEl);
}

function onGridDragLeave(e, tabId) {
  const grid = document.getElementById(`grid-${tabId}`);
  if (!grid.contains(e.relatedTarget)) {
    grid.classList.remove('drag-over');
    document.querySelectorAll('.drop-placeholder').forEach(p => p.remove());
  }
}

function onGridDrop(e, toTabId) {
  e.preventDefault();
  document.querySelectorAll('.drop-placeholder').forEach(p => p.remove());
  document.querySelectorAll('.cards-grid').forEach(g => g.classList.remove('drag-over'));
  if (!dragCardId) return;
  const fromTab = tabs.find(t => t.id === dragFromTab);
  const toTab = tabs.find(t => t.id === toTabId);
  if (!fromTab || !toTab) return;
  const cardIdx = fromTab.cards.findIndex(c => String(c.id) === String(dragCardId));
  if (cardIdx === -1) return;
  const [card] = fromTab.cards.splice(cardIdx, 1);
  const grid = document.getElementById(`grid-${toTabId}`);
  const afterEl = getDragAfterElement(grid, e.clientX);
  if (afterEl == null || afterEl.classList.contains('add-card')) {
    toTab.cards.push(card);
  } else {
    const afterIdx = toTab.cards.findIndex(c => String(c.id) === String(afterEl.getAttribute('data-card-id')));
    toTab.cards.splice(afterIdx, 0, card);
  }
  dragCardId = null; dragFromTab = null;
  triggerSave(); fillGrid(fromTab);
  if (fromTab.id !== toTab.id) fillGrid(toTab);
}

function getDragAfterElement(grid, x) {
  return [...grid.querySelectorAll('.card:not(.dragging)')].reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = x - box.right + box.width / 2;
    if (offset < 0 && offset > closest.offset) return { offset, element: child };
    return closest;
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}

// ══════════════════════════════════════════
//  TAB ACTIONS
// ══════════════════════════════════════════
function switchTab(id) {
  activeTab = id;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  const btn = document.querySelector(`.tab-btn[data-tab-id="${id}"]`);
  if (btn) btn.classList.add('active');
  document.getElementById(`pane-${id}`)?.classList.add('active');
}

function startRenameTab(tabId, e) {
  e.stopPropagation();
  const btn = document.querySelector(`.tab-btn[data-tab-id="${tabId}"]`);
  if (!btn) return;
  const labelSpan = btn.querySelector('.tab-label-txt');
  const oldName = labelSpan.textContent;
  const inp = document.createElement('input');
  inp.className = 'tab-rename-inp';
  inp.value = oldName;
  labelSpan.replaceWith(inp);
  inp.focus(); inp.select();

  const commit = () => {
    const newName = inp.value.trim() || oldName;
    const tab = tabs.find(t => t.id === tabId);
    if (tab) { tab.label = newName; triggerSave(); }
    renderTabs();
  };
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e2 => {
    if (e2.key === 'Enter') { inp.blur(); }
    if (e2.key === 'Escape') { inp.value = oldName; inp.blur(); }
    e2.stopPropagation();
  });
}

function deleteTab(tabId, e) {
  e.stopPropagation();
  const tab = tabs.find(t => t.id === tabId);
  if (!tab) return;
  if (!confirm(`حذف قسم "${tab.label}" وجميع كروته؟`)) return;
  tabs = tabs.filter(t => t.id !== tabId);
  if (activeTab === tabId) activeTab = tabs[0]?.id || null;
  triggerSave();
  renderTabs();
}

// ══════════════════════════════════════════
function openCardModal(tabId, cardId) {
  currentCardTab = tabId;
  currentEditCardId = cardId || null;
  selEmoji = '🌐';

  if (cardId) {
    // EDIT MODE
    document.getElementById('cardModalTitle').textContent = '✎ تعديل الكرت';
    const tab = tabs.find(t => t.id === tabId);
    const card = tab?.cards.find(c => String(c.id) === String(cardId));
    if (card) {
      document.getElementById('mName').value = card.name;
      document.getElementById('mUrl').value = card.url;
      selEmoji = card.emoji || '🌐';
    }
  } else {
    // ADD MODE
    document.getElementById('cardModalTitle').textContent = '➕ إضافة كرت';
    document.getElementById('mName').value = '';
    document.getElementById('mUrl').value = '';
    selEmoji = '🌐';
  }

  buildEmojiGrid();
  document.getElementById('cardModal').classList.add('on');
  document.getElementById('mName').focus();
}

function editCard(cardId, tabId, e) {
  e.preventDefault(); e.stopPropagation();
  openCardModal(tabId, cardId);
}

function closeCardModal() {
  document.getElementById('cardModal').classList.remove('on');
  currentEditCardId = null;
}
document.getElementById('cardModal').addEventListener('click', e => {
  if (e.target === document.getElementById('cardModal')) closeCardModal();
});

function buildEmojiGrid() {
  document.getElementById('emojiGrid').innerHTML = EMOJIS.map(em =>
    `<div class="emo ${em===selEmoji?'sel':''}" onclick="pickEmoji('${em}',this)">${em}</div>`
  ).join('');
}
function pickEmoji(em, el) {
  selEmoji = em;
  document.querySelectorAll('.emo').forEach(e => e.classList.remove('sel'));
  el.classList.add('sel');
}

function saveCard() {
  const name = document.getElementById('mName').value.trim();
  let url = document.getElementById('mUrl').value.trim();
  if (!name || !url) { alert('يرجى تعبئة الاسم والرابط'); return; }
  if (!url.startsWith('http')) url = 'https://' + url;
  const tab = tabs.find(t => t.id === currentCardTab);
  if (!tab) return;

  if (currentEditCardId) {
    // UPDATE existing
    const card = tab.cards.find(c => String(c.id) === String(currentEditCardId));
    if (card) { card.name = name; card.url = url; card.emoji = selEmoji; }
  } else {
    // NEW card
    tab.cards.push({ id: Date.now(), name, url, emoji: selEmoji });
  }

  triggerSave(); closeCardModal(); fillGrid(tab);
}

function delCard(cardId, tabId, e) {
  e.preventDefault(); e.stopPropagation();
  if (!confirm('حذف هذا الكرت؟')) return;
  const tab = tabs.find(t => t.id === tabId);
  if (tab) tab.cards = tab.cards.filter(c => String(c.id) !== String(cardId));
  triggerSave(); fillGrid(tab);
}

  document.getElementById('tName').value = '';

function closeTabModal() { document.getElementById('tabModal').classList.remove('on'); }

function saveTab() {
  const name = document.getElementById('tName').value.trim();
  if (!name) return;
  const id = 'tab_' + Date.now();
  tabs.push({ id, label: name, cards: [] });
  triggerSave(); closeTabModal(); renderTabs(); switchTab(id);
}

let tasks = JSON.parse(localStorage.getItem('mnm_tasks') || '[]');
function saveTasks() { localStorage.setItem('mnm_tasks', JSON.stringify(tasks)); }
function addTask() {
  const inp = document.getElementById('taskInp');
  const txt = inp.value.trim();
  if (!txt) return;
  tasks.push({ id: Date.now(), text: txt, done: false });
  inp.value = ''; triggerSave(); renderTasks();
}
function toggleTask(id) {
  tasks = tasks.map(t => t.id===id ? {...t,done:!t.done} : t);
  saveTasks(); renderTasks();
}
function delTask(id) {
  tasks = tasks.filter(t => t.id!==id);
  saveTasks(); renderTasks();
}
function renderTasks() {
  const el = document.getElementById('tasksList');
  if (!el) return;
  if (!tasks.length) {
    el.innerHTML='<li style="text-align:center;padding:6px;color:var(--sub);font-size:11px;">✦ لا توجد مهام حالياً</li>';
    return;
  }
  el.innerHTML = tasks.map(t=>`
    <li class="task-li">
      <div class="task-li-r">
        <input type="checkbox" class="t-cb" ${t.done?'checked':''} onchange="toggleTask(${t.id})">
        <span class="t-txt ${t.done?'done':''}">${t.text}</span>
      </div>
      <button class="t-del" onclick="delTask(${t.id})">✕</button>
    </li>`).join('');
}
document.getElementById('taskInp')?.addEventListener('keypress', e => { if(e.key==='Enter') addTask(); });

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeCardModal();
    closeTabModal();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    // If card modal is open, save it
    if (document.getElementById('cardModal').classList.contains('on')) saveCard();
  }
});

//  INIT

setInterval(tick, 1000);

window.addEventListener('DOMContentLoaded', async () => {
  tick();
  loadTabs();

  if (SHEETS_URL) {
    const remote = await pullFromSheets();
    if (remote && remote.tabs && remote.tabs.length > 0) {
      tabs = remote.tabs;
      saveTabs();
    }
    if (remote && remote.tasks) {
      tasks = remote.tasks;
      saveTasks();
    }
  }

  renderTabs();
  renderTasks();

  if (needsPrayerRefetch()) {
    await fetchPrayers();
  } else {
    const raw = JSON.parse(localStorage.getItem('p_cache') || 'null');
    if (raw) applyPrayerData(raw);
  }

  const now = new Date();
  const msToMidnight = new Date(now.getFullYear(),now.getMonth(),now.getDate()+1,0,1,0) - now;
  setTimeout(async () => { await fetchPrayers(); }, msToMidnight);
});

// ══════════════════════════════════════════
//  CONTEXT MENU
// ══════════════════════════════════════════
let ctxTarget = null;

function showCtx(e, items) {
  e.preventDefault();
  e.stopPropagation();
  const menu = document.getElementById('ctxMenu');
  menu.innerHTML = items.map(item => {
    if (item === 'sep') return '<div class="ctx-sep"></div>';
    return `<div class="ctx-item ${item.danger?'danger':''}" onclick="ctxAction(${JSON.stringify(item.action)})">`
      + `<span class="ctx-icon">${item.icon}</span>${item.label}</div>`;
  }).join('');

  menu.classList.remove('open');
  document.body.appendChild(menu);

  // Position
  const vw = window.innerWidth, vh = window.innerHeight;
  let x = e.clientX, y = e.clientY;
  menu.style.left = '0'; menu.style.top = '0';
  menu.classList.add('open');
  const mw = menu.offsetWidth, mh = menu.offsetHeight;
  if (x + mw > vw - 8) x = vw - mw - 8;
  if (y + mh > vh - 8) y = vh - mh - 8;
  menu.style.left = x + 'px';
  menu.style.top  = y + 'px';
}

function hideCtx() {
  const menu = document.getElementById('ctxMenu');
  menu.classList.remove('open');
  ctxTarget = null;
}

function ctxAction(action) {
  hideCtx();
  const { type, cardId, tabId } = action;
  if (type === 'editCard')   openCardModal(tabId, cardId);
  if (type === 'delCard')    delCard(cardId, tabId, { preventDefault(){}, stopPropagation(){} });
  if (type === 'renameTab')  startRenameTab(tabId, { stopPropagation(){} });
  if (type === 'delTab')     deleteTab(tabId, { stopPropagation(){} });
  if (type === 'addCard')    openCardModal(tabId, null);
}

document.addEventListener('click', e => {
  if (!document.getElementById('ctxMenu').contains(e.target)) hideCtx();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') hideCtx(); });

</script>

<!-- CONTEXT MENU -->
<div id="ctxMenu" class="ctx-menu"></div>
